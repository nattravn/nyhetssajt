<h2>{{svdService.sourceName}}</h2>
<p>{{svdService.sourceInfo}}</p>
<div *ngFor="let feed of svdService.list">
    <div class="col-md-10 blogShort">
        <h1>{{feed.Title}}</h1>
        <!-- <img [src]="feed.ImageURL" alt="post img" class="pull-left img-responsive thumb margin10 img-thumbnail"> -->
        <article>
            <div [innerHTML]="feed.Text"></div>
        </article>
        <em>{{feed.Date}}</em>
        <br>
        <a (click)="categoryService.populate(feed.Category)"  routerLink="/category">{{feed.Category}}</a>
        <br>
        <a [href]="feed.Link">Läs mer</a> 
    </div>
  </div>
