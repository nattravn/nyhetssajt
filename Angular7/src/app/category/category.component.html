<div *ngFor="let feed of categoryService.categoryList">
  <div class="col-md-10 blogShort">
      <h1>{{feed.Title}}</h1>
      <!-- <img [src]="feed.ImageURL" alt="post img" class="pull-left img-responsive thumb margin10 img-thumbnail"> -->
      <article>
          <div [innerHTML]="feed.Text"></div>
      </article>
      <em>{{feed.Date}}</em>
      <br>
      <p >{{feed.Category}}</p>
      <br>
      <a class="btn btn-blog pull-right marginBottom10" [href]="feed.Link">Läs mer</a> 
  </div>
</div>
